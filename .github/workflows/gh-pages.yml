name: Build and deploy Github pages
on:
  push:
    branches:
      - main
  # This command allows to rerun action with a button on github
  workflow_dispatch: 
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch all history for all tags and branches

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install relife locally with doc dependencies
        run: |
          python -m pip install . --group dev

      - name: Extra installs
        # pandoc is required by sphinx extensions
        run: sudo apt-get update && sudo apt-get install -y pandoc
      
      - name: Build Sphinx docs for selected versions (see comments in file docs_versioning_build.sh)
        env:
          # Use DOCS_BASE_URL_OVERRIDE env variable for debug (local deployment on your own github pages)
          DOCS_BASE_URL: ${{ vars.DOCS_BASE_URL_OVERRIDE || 'https://opensource.rte-france.com/relife/' }}
        run: bash docs/source/docs_versioning_build.sh

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # branch on which files are commited
          folder: ./_site/ # The folder the action should deploy.
          clean: true # clean the content of _site/ if exists

      - name: Save website as an artifact
        uses: actions/upload-artifact@v6
        with:
          name: website
          path: ./_site
          retention-days: 14

